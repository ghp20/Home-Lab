version: "3.8"

services:
  plex:
    image: lscr.io/linuxserver/plex:${PLEX_TAG:-latest}
    container_name: plex
    restart: unless-stopped
    environment:
      - PUID=changeme
      - PGID=changeme
      - TZ=${TZ}
      - VERSION=changeme
      - PLEX_CLAIM=changeme
    volumes:
      - ${STORAGE_ROOT}/config:/config
      - ${STORAGE_ROOT}/transcode:/transcode
      - ${MEDIA_ROOT}:/media
    ports:
      - "${PLEX_PORT}:${PLEX_PORT}"
    devices:
      - /dev/dri:/dev/dri