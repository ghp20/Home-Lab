version: "3.8"

services:
  claude-code:
    image: node:20-slim
    container_name: claude-code
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      - ANTHROPIC_API_KEY=CHANGEME  # replace with your key
      - PATH=/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - CLAUDE_DISABLE_OAUTH=true
    volumes:
      - /path/to/your/data:/root/.claude
      - /path/to/your/data:/workspace  # mount your pool so Claude can work on files
    command: >
        bash -c "apt-get update && apt-get install -y curl && curl -fsSL https://claude.ai/install.sh | bash && ln -sf /root/.local/bin/claude /usr/local/bin/claude && tail -f /dev/null"
    restart: unless-stopped