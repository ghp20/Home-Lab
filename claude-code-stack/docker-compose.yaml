version: "3.8"

services:
  claude-code:
    image: node:${NODE_TAG:-20-slim}
    container_name: claude-code
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      - ANTHROPIC_API_KEY=your-api-key-here
      - PATH=changeme
      - CLAUDE_DISABLE_OAUTH=true
    volumes:
      - ${STORAGE_ROOT}:/root/.claude
      - ${WORKSPACE_ROOT}:/workspace
    command: >
        bash -c "apt-get update && apt-get install -y curl && curl -fsSL https://claude.ai/install.sh | bash && ln -sf /root/.local/bin/claude /usr/local/bin/claude && tail -f /dev/null"
    restart: unless-stopped