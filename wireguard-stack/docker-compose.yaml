version: '3.9'
services:
  wireguard-us-server:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard-us-server
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
      SERVERMODE: 'off'
      PUID: '3001'
      PGID: '3000'
      PATH: /lsiopy/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PS1: '$(whoami)@$(hostname):$(pwd)\$ '
      HOME: /root
      TERM: xterm
      S6_CMD_WAIT_FOR_SERVICES_MAXTIME: '0'
      S6_VERBOSITY: '1'
      S6_STAGE2_HOOK: /docker-mods
      VIRTUAL_ENV: /lsiopy
      LSIO_FIRST_PARTY: 'true'
    ports:
    - 22:22/tcp
    - 443:443/tcp
    network_mode: host
    volumes:
    - ${DATA_PATH}:/config:rw
    - /lib/modules:/lib/modules:ro
    logging:
      driver: gelf
      options:
        gelf-address: udp://${HOST_IP}:12201
        tag: '{{.Name}}'
networks:
  host: {}
