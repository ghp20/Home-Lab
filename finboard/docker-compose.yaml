services:

  backend:
    image: node:20-alpine
    container_name: fin-backend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache python3 make g++ &&
        npm install --omit=dev &&
        node server.js
      "
    environment:
      NODE_ENV: production
      PORT: "3003"
      JWT_SECRET: changeme
      DB_PATH: /data/finance.db
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}   # Settings â Security â App passwords
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV}
      
    volumes:
      - /path/to/your/data:/data
      - /path/to/your/data:/app
    networks:
      - fin_internal
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    image: nginx:alpine
    container_name: fin-frontend
    restart: unless-stopped
    ports:
      - "8092:80"
    volumes:
      - /path/to/your/data:/usr/share/nginx/html:ro
      - /path/to/your/data:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fin_internal
    depends_on:
      - backend

networks:
  fin_internal:
    driver: bridge