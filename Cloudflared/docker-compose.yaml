version: "3.9"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /path/to/cloudflared:/etc/cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    restart: unless-stopped
