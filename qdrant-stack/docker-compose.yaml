version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_TAG:-latest}
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:6333"
      - "${GRPC_PORT}:6334"
    environment:
      - QDRANT__STORAGE__WAL_CAPACITY_MB=64
      - QDRANT__STORAGE__WAL_SEGMENTS_AHEAD=2
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - ${NVME_STORAGE}:/qdrant/storage
      - ${STORAGE_ROOT}/snapshots:/qdrant/snapshots
      - ${STORAGE_ROOT}/config:/qdrant/config
    labels:
      - autoheal=true