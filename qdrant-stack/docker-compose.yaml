version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API

    environment:
      - QDRANT__STORAGE__WAL_CAPACITY_MB=64
      - QDRANT__STORAGE__WAL_SEGMENTS_AHEAD=2
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

    volumes:
      - /mnt/nvmepool/appsconfig/qdrant/storage:/qdrant/storage
      #- /path/to/your/data:/qdrant/storage
      - /path/to/your/data:/qdrant/snapshots
      - /path/to/your/data:/qdrant/config

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://your-server-ip:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

    labels:
      - autoheal=true