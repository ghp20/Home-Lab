version: '3.9'
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__STORAGE__WAL_CAPACITY_MB: '64'
      QDRANT__STORAGE__WAL_SEGMENTS_AHEAD: '2'
      QDRANT__SERVICE__HTTP_PORT: '6333'
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      DIR: ''
      TZ: Etc/UTC
      RUN_MODE: production
    ports:
    - 6333:6333/tcp
    - 6334:6334/tcp
    networks: qdrant-stack_default
    volumes:
    - ${DATA_PATH}:/qdrant/storage:rw
    - ${DATA_PATH}:/qdrant/snapshots:rw
    - ${DATA_PATH}:/qdrant/config:rw
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  qdrant-stack_default:
    external: true
