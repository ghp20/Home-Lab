version: "3.9"

services:
  music-assistant-server:
    image: ghcr.io/music-assistant/server:latest
    container_name: music-assistant-server
    restart: unless-stopped

    ports:
      - "8095:8095"   # or whatever port MA uses

    volumes:
      # Persistent MA config & library DB
      - "/path/to/your/data:/data:rw"
      # Optional: your local music files on the NAS
      - "/path/to/your/data:/media:ro"

    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH

    security_opt:
      - apparmor:unconfined

    environment:
      # Logging level: critical|error|warning|info|debug
      - LOG_LEVEL=info
      - MASS_DISABLE_ZEROCONF=true

# No exposed ports here because host mode includes all required ports