version: "3.8"

services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped

    ports:
      - "8265:8265"   # WebUI
      - "8266:8266"   # Server API

    environment:
      - TZ=America/Los_Angeles
      - PUID=3001
      - PGID=3000
      - UMASK=002

      # Tdarr recommended paths
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265

    volumes:
      - /path/to/your/data:/app/server
      - /path/to/your/data:/app/configs
      - /path/to/your/data:/app/logs
      - /mnt/nvmepool/appsconfig/tdarr/temp:/temp

      # Media (read-only is safer; Tdarr will output to your transcoded folders)
      - /path/to/your/data:/media
      #- /path/to/your/data:/media/movies:ro
      #- /path/to/your/data:/media/tv:ro

      # Output folders (write)
      - /path/to/your/data:/output/movies
      - /path/to/your/data:/output/tv

    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0

    group_add:
      - "44"     # video
      - "107"    # render (common on Debian/Ubuntu based containers)

    privileged: true

    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 32G

  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    restart: unless-stopped

    environment:
      - TZ=America/Los_Angeles
      - PUID=3001
      - PGID=3000
      - UMASK=002

      # Node -> Server connection
      - serverIP=tdarr
      - serverPort=8266

      # Node identity
      - nodeName=truenas-us-node

    volumes:
      - /path/to/your/data:/app/configs
      - /path/to/your/data:/app/logs
      - /mnt/nvmepool/appsconfig/tdarr/temp:/temp

      - /path/to/your/data:/media
      #- /path/to/your/data:/media/movies:ro
      #- /path/to/your/data:/media/tv:ro

      - /path/to/your/data:/output/movies
      - /path/to/your/data:/output/tv

    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0

    group_add:
      - "44"     # video
      - "107"    # render (common on Debian/Ubuntu based containers)

    privileged: true

    depends_on:
      - tdarr

    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 32G