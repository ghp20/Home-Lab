version: "3.8"

services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:${TDARR_TAG:-latest}
    container_name: tdarr
    restart: unless-stopped
    ports:
      - "${UI_PORT}:${UI_PORT}"
      - "${API_PORT}:${API_PORT}"
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - serverIP=0.0.0.0
      - serverPort=${API_PORT}
      - webUIPort=${UI_PORT}
    volumes:
      - ${STORAGE_ROOT}/server:/app/server
      - ${STORAGE_ROOT}/config:/app/configs
      - ${STORAGE_ROOT}/log:/app/logs
      - ${TEMP_ROOT}:/temp
      - ${MEDIA_ROOT}/:/media
      - ${MEDIA_ROOT}/Movies:/output/movies
      - ${MEDIA_ROOT}/Tv:/output/tv
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    group_add:
      - "44"
      - "107"
    privileged: true
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT}"
          memory: ${MEM_LIMIT}

  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:${NODE_TAG:-latest}
    container_name: tdarr-node
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - serverIP=tdarr
      - serverPort=${API_PORT}
      - nodeName=truenas-us-node
    volumes:
      - ${STORAGE_ROOT}/config:/app/configs
      - ${STORAGE_ROOT}/log:/app/logs
      - ${TEMP_ROOT}:/temp
      - ${MEDIA_ROOT}/:/media
      - ${MEDIA_ROOT}/Movies:/output/movies
      - ${MEDIA_ROOT}/Tv:/output/tv
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    group_add:
      - "44"
      - "107"
    privileged: true
    depends_on:
      - tdarr
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT}"
          memory: ${MEM_LIMIT}