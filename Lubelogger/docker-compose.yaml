version: "3.8"

services:
  lubelogger:
    image: ghcr.io/hargata/lubelogger:latest
    container_name: lubelogger
    restart: unless-stopped

    environment:
      PUID: 3001
      PGID: 3000
      TZ: America/Los_Angeles

      # === LubeLogger App Settings ===
      # SQLite is default (no DB needed)
      ASPNETCORE_URLS: http://0.0.0.0:8080

      # Recommended: fix locale/culture warning
      LL__Locale: en-US
      LL__Culture: en-US

      # Optional SMTP (leave blank for now)
      LL__Smtp__Enabled: "false"

      # Optional Message of the Day
      LL__MOTD__Enabled: "false"

      # Fix DataProtection warning
      # (Store keys outside container)
      ASPNETCORE_DATAPROTECTION__DIRECTORY: /App/keys

    volumes:
      - /path/to/your/data:/App/data
      - /path/to/your/data:/App/keys

    ports:
      - "8100:8080"