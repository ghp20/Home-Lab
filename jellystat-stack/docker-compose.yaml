version: "3.8"

services:
  jellystat-db:
    image: postgres:17
    container_name: jellystat-db
    environment:
      POSTGRES_DB: jellystat
      POSTGRES_USER: jellystat
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      TZ=${TZ}
    volumes:
      - /mnt/storagepool/apps_config/jellystat/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    ports:
      - "8090:3000"   # WebUI -> http://truenas-ip:8090
    environment:
      - TZ=${TZ}

      # Jellystat DB configuration
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=jellystat

      # Change this to a long random string
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - /mnt/storagepool/apps_config/jellystat/backup:/app/backend/backup-data
    depends_on:
      - jellystat-db
    restart: unless-stopped