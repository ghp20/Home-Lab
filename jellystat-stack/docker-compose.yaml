version: "3.8"

services:
  jellystat-db:
    image: postgres:${PG_TAG:-17}
    container_name: jellystat-db
    environment:
      POSTGRES_DB: changeme
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
      TZ: ${TZ}
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:${JELLYSTAT_TAG:-latest}
    container_name: jellystat
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      - TZ=${TZ}
      - POSTGRES_USER=changeme
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=changeme
      - JWT_SECRET=changeme-secret
    volumes:
      - ${STORAGE_ROOT}/backup:/app/backend/backup-data
    depends_on:
      - jellystat-db
    restart: unless-stopped