version: '3.9'
services:
  ix-homarr-homarr-1:
    image: ghcr.io/homarr-labs/homarr:v1.59.1
    container_name: ix-homarr-homarr-1
    restart: unless-stopped
    environment:
      USER_ID: '568'
      UMASK_SET: '002'
      TZ: America/Los_Angeles
      UMASK: '002'
      UID: '568'
      PUID: '568'
      GROUP_ID: '568'
      PGID: '568'
      NVIDIA_VISIBLE_DEVICES: void
      GID: '568'
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
      DB_DIALECT: sqlite
      DB_URL: /appdata/db/db.sqlite
      DB_DRIVER: better-sqlite3
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      NODE_VERSION: 24.14.1
      YARN_VERSION: 1.22.22
      AUTH_PROVIDERS: ${AUTH_PROVIDERS}
      REDIS_IS_EXTERNAL: 'false'
      NODE_ENV: production
    ports:
    - 30100:7575/tcp
    networks: ix-homarr_default
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --spider
      - http://127.0.0.1:7575/api/health/live
      interval: 30000000000
      timeout: 5000000000
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  ix-homarr_default:
    external: true
