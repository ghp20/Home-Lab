version: '3.9'
services:
  claude-code:
    image: node:20-slim
    container_name: claude-code
    restart: unless-stopped
    environment:
      PATH: /.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      CLAUDE_DISABLE_OAUTH: 'true'
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_VERSION: 20.20.1
      YARN_VERSION: 1.22.22
    networks: claude-code-stack_default
    volumes:
    - ${DATA_PATH}:/root/.claude:rw
    - ${DATA_PATH}:/workspace:rw
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  claude-code-stack_default:
    external: true
