version: "3.9"

services:
  db:
    image: postgres:15
    container_name: wygiwyh-db
    hostname: wygiwyh-db
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: wygiwyhuser
      POSTGRES_PASSWORD: ${ADMIN_PASSWORD}
      POSTGRES_DB: wygiwyhdb
    volumes:
      - /path/to/your/data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d wygiwyhdb -U wygiwyhuser"]
      interval: 10s
      timeout: 45s
      retries: 10
    restart: on-failure:5

  wygiwyh:
    image: eitchtee/wygiwyh:latest
    container_name: wygiwyh
    command: /start-single
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Host port : container port
      - "9711:8000"
    environment:
      # ---- basic settings ----
      TZ: America/Los_Angeles
      DEBUG: "false"

      # Set this to whatever URL you'll actually use.
      # For local-only access you can start with your TrueNAS IP:
      # e.g. http://your-server-ip:9711
      URL: "http://your-server-ip:9711"
      HTTPS_ENABLED: "false"

      # Generate your own 64-char random string here
      SECRET_KEY: "${SECRET_KEY}"

      # Allow all hosts initially; you can tighten this later
      DJANGO_ALLOWED_HOSTS: "*"

      # Optional outbound port (can leave as default or change)
      OUTBOUND_PORT: 9005

      # ---- initial admin user (first login) ----
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${WYGIWYH_ADMIN_PASSWORD}"

      # ---- database connection ----
      SQL_DATABASE: wygiwyhdb
      SQL_USER: wygiwyhuser
      SQL_PASSWORD: ${ADMIN_PASSWORD}
      SQL_HOST: wygiwyh-db
      SQL_PORT: 5432

      # ---- performance / behavior ----
      WEB_CONCURRENCY: 4
      ENABLE_SOFT_DELETE: "false"
      KEEP_DELETED_TRANSACTIONS_FOR: 365
      TASK_WORKERS: 1

    volumes:
      - /path/to/your/data:/app/media:rw
      - /path/to/your/data:/app/static:rw

    healthcheck:
      # simple TCP healthcheck on the internal port
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s

    restart: on-failure:5