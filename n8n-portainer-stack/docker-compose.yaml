version: '3.8'

services:
  n8n:
    image: n8nio/n8n:${N8N_TAG:-latest}
    container_name: n8n
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      - TZ=${TZ}{TZ}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}{WEBHOOK_URL}
      - N8N_PORT=${CONTAINER_PORT}
      - N8N_TRUST_PROXY=${N8N_TRUST_PROXY}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_AI_ENABLED=${N8N_AI_ENABLED}
      - N8N_ENABLE_COMMUNITY_NODES=${N8N_ENABLE_COMMUNITY_NODES}
      - N8N_API_KEY=${API_KEY}{N8N_API_KEY}
      - N8N_ALLOW_FILE_ACCESS=${N8N_ALLOW_FILE_ACCESS}
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=${N8N_BLOCK_FILES_ACCESS}
      - GENERIC_TIMEZONE=${TZ}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}{POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_ROOT}/portainer-restore-test:/home/node/.n8n
      - ${STORAGE_ROOT_BASE}/n8n/know_base:/home/node/.n8n-files
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - default
      - trading-net-ron

  n8n-postgres:
    image: postgres:${PG_TAG:-15-alpine}
    container_name: n8n-postgres
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}{POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_ROOT}/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: n8n-portainer-stack_default
  trading-net-ron:
    external: true