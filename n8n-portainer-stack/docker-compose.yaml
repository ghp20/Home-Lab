version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - 5678:5678
    environment:
      - TZ=${TZ}
      - N8N_HOST=n3n.${N8N_DOMAIN}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}{N8N_DOMAIN}
      - N8N_PORT=5678
      - N8N_TRUST_PROXY=true
      - N8N_SECURE_COOKIE=false
      - N8N_AI_ENABLED=true
      - N8N_ENABLE_COMMUNITY_NODES=true
      - N8N_API_KEY=${API_KEY}
      - N8N_ALLOW_FILE_ACCESS=/data
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=false
      - GENERIC_TIMEZONE=America/Los_Angeles
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
    volumes:
      - /mnt/storagepool/apps_config/n8n/portainer-restore-test:/home/node/.n8n
      - /mnt/storagepool/master/n8n/know_base:/home/node/.n8n-files
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - default
      - trading-net-ron

  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /mnt/storagepool/apps_config/n8n/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: n8n-portainer-stack_default
  trading-net-ron:
    external: true
