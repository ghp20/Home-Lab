version: '3.8'

services:
  n8n:
    image: n8nio/n8n:${N8N_TAG:-latest}
    container_name: n8n
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      - TZ=${TZ}
      - N8N_HOST=changeme
      - N8N_PROTOCOL=changeme
      - WEBHOOK_URL=changeme
      - N8N_PORT=changeme
      - N8N_TRUST_PROXY=changeme
      - N8N_SECURE_COOKIE=changeme
      - N8N_AI_ENABLED=changeme
      - N8N_ENABLE_COMMUNITY_NODES=changeme
      - N8N_API_KEY=your-api-key-here
      - N8N_ALLOW_FILE_ACCESS=changeme
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=changeme
      - GENERIC_TIMEZONE=${TZ}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=changeme
      - DB_POSTGRESDB_USER=changeme
      - DB_POSTGRESDB_PASSWORD=changeme-db-pass
    volumes:
      - ${STORAGE_ROOT}/portainer-restore-test:/home/node/.n8n
      - ${STORAGE_ROOT_BASE}/n8n/know_base:/home/node/.n8n-files
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - default
      - trading-net-ron

  n8n-postgres:
    image: postgres:${PG_TAG:-15-alpine}
    container_name: n8n-postgres
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - POSTGRES_DB=changeme
      - POSTGRES_USER=changeme
      - POSTGRES_PASSWORD=changeme
    volumes:
      - ${STORAGE_ROOT}/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: n8n-portainer-stack_default
  trading-net-ron:
    external: true