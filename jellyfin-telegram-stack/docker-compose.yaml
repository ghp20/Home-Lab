version: "3.8"

services:
  jellyfin-telegram:
    image: python:${PYTHON_TAG:-3.11-slim}
    container_name: jellyfin-telegram
    restart: unless-stopped
    environment:
      JELLYFIN_URL: changeme
      JELLYFIN_API_KEY: your-api-key-here
      TELEGRAM_TOKEN: your-api-key-here
      TELEGRAM_CHAT_ID: changeme
    volumes:
      - ${STORAGE_ROOT}:/app
    working_dir: /app
    command: >
      sh -c "pip install requests &&
             python app.py" 