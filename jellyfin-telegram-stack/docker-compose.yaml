version: "3.8"

services:
  jellyfin-telegram:
    image: python:3.11-slim
    container_name: jellyfin-telegram
    restart: unless-stopped

    environment:
      JELLYFIN_URL: "http://${TRUENAS_HOST}:8096"
      JELLYFIN_API_KEY=${JELLYFIN_API_KEY}{API_KEY}
      TELEGRAM_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "5742623272"

    volumes:
      - /mnt/storagepool/scripts/jellyfin-telegram:/app

    working_dir: /app

    command: >
      sh -c "pip install requests &&
             python app.py"
