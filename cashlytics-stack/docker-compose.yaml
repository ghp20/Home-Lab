version: "3.9"

services:
  postgres:
    image: postgres:${PG_TAG:-16-alpine}
    container_name: cashlytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}{POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data

  cashlytics:
    image: ghcr.io/aaronjoeldev/cashlytics-ai:${CASHLYTICS_TAG:-latest}
    container_name: cashlytics
    restart: unless-stopped
    depends_on: [postgres]
    ports:
      - "${HOST_PORT}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE}
      NEXT_PUBLIC_DEFAULT_CURRENCY: ${NEXT_PUBLIC_DEFAULT_CURRENCY}
      AUTH_SECRET=${AUTH_SECRET}{AUTH_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      SINGLE_USER_MODE: ${SINGLE_USER_MODE}
      SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL}
      OPENAI_API_KEY=${API_KEY}{OPENAI_API_KEY}
      CRON_SECRET=${CRON_SECRET}{CRON_SECRET}
    user: "${PUID}:${PGID}"

  cashlytics-cron:
    image: alpine:3.20
    container_name: cashlytics-cron
    restart: unless-stopped
    command: >
      sh -c "while true; do
      wget -qO- http://cashlytics:3000/api/cron/${CRON_SECRET};
      sleep 3600;
      done"
    depends_on: [cashlytics]