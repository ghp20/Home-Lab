version: "3.9"

services:
  postgres:
    image: postgres:${PG_TAG:-16-alpine}
    container_name: cashlytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: changeme
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data

  cashlytics:
    image: ghcr.io/aaronjoeldev/cashlytics-ai:${CASHLYTICS_TAG:-latest}
    container_name: cashlytics
    restart: unless-stopped
    depends_on: [postgres]
    ports:
      - "${HOST_PORT}:3000"
    environment:
      DATABASE_URL: changeme
      NEXT_PUBLIC_APP_URL: changeme
      NEXT_PUBLIC_DEFAULT_LOCALE: changeme
      NEXT_PUBLIC_DEFAULT_CURRENCY: changeme
      AUTH_SECRET: changeme-secret
      AUTH_TRUST_HOST: changeme
      SINGLE_USER_MODE: changeme
      SINGLE_USER_EMAIL: changeme
      OPENAI_API_KEY: your-api-key-here
      CRON_SECRET: changeme-secret
    user: "${PUID}:${PGID}"

  cashlytics-cron:
    image: alpine:3.20
    container_name: cashlytics-cron
    restart: unless-stopped
    command: >
      sh -c "while true; do
      wget -qO- http://cashlytics:3000/api/cron/${CRON_SECRET};
      sleep 3600;
      done"
    depends_on: [cashlytics]