version: '3.9'
services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
    - 8097:8090/tcp
    networks: beszel-stack_default
    volumes:
    - ${DATA_PATH}:/beszel_data:rw
    - ${DATA_PATH}:/beszel_socket:rw
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:8097
      TOKEN: ${TOKEN}
      KEY: ${KEY}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    network_mode: host
    volumes:
    - ${DATA_PATH}:/var/lib/beszel-agent:rw
    - ${DATA_PATH}:/beszel_socket:rw
    - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  host: {}
  beszel-stack_default:
    external: true
