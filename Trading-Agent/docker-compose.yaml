version: "3.9"
services:
  trading-agent:
    image: trading-agent:latest
    container_name: trading-agent
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - /path/to/your/data:/app/config/config.yaml:ro
      - /path/to/your/data:/app/config/.env:ro
      - /path/to/your/data:/app/models
      - /path/to/your/data:/app/logs
      - /path/to/your/data:/app/data
      - /path/to/your/data:/app/src/options.py:ro
      - /path/to/your/data:/app/src/backtest_options.py:ro
      - /path/to/your/data:/app/src/main.py:ro
      - /path/to/your/data:/app/src/notifier.py:ro
      - /path/to/your/data:/app/src/db.py:ro  
      - /path/to/your/data:/app/src/broker.py:ro
      - /path/to/your/data:/app/src/portfolio.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       trading_agent
      POSTGRES_USER:     agent
      POSTGRES_PASSWORD: changeme
    volumes:
      - /path/to/your/data:/var/lib/postgresql/data
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d trading_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - /path/to/your/data:/data
    networks:
      - trading-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  trading-net:
    driver: bridge
    name: trading-net