version: "3.9"

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"     # Public HTTP
      - "443:443"   # Public HTTPS
      - "30020:81"     # NPM Admin UI
    volumes:
      - /path/to/your/data:/data
      - /path/to/your/data:/etc/letsencrypt
    environment:
      - TZ=America/Los_Angeles