version: "3.9"

services:
  trading-agent-ron:
    image: trading-agent-ron:${RON_TAG:-latest}
    container_name: trading-agent-ron
    restart: unless-stopped
    ports: ["${AGENT_PORT}:8000"]
    volumes:
      - ${STORAGE_ROOT}/config/config.yaml:/app/config/config.yaml:ro
      - ${STORAGE_ROOT}/config/.env:/app/config/.env:ro
      - ${STORAGE_ROOT}/models:/app/models
      - ${STORAGE_ROOT}/logs:/app/logs
      - ${STORAGE_ROOT}/data:/app/data
      - ${STORAGE_ROOT}/src/:/app/src/
    depends_on:
      trading-postgres-ron: {condition: service_healthy}
      trading-redis-ron: {condition: service_healthy}
    networks: [trading-net-ron]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  trading-postgres-ron:
    image: postgres:${PG_TAG:-15-alpine}
    container_name: trading-postgres-ron
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}{POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data
    networks: [trading-net-ron]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports: ["${DB_PORT}:5432"]

  trading-redis-ron:
    image: redis:${REDIS_TAG:-7-alpine}
    container_name: trading-redis-ron
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${STORAGE_ROOT}/redis:/data
    networks: [trading-net-ron]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  trading-net-ron: {driver: bridge, name: trading-net-ron}