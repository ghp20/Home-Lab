version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:11434"
    environment:
      # GPU - full compute access
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,video
      # Ollama config
      - OLLAMA_HOST=${OLLAMA_HOST}
      - UID=3001
      - GID=3000
      - OLLAMA_MODELS=/models
      - OLLAMA_CONFIG=/config
      - OLLAMA_KEEP_ALIVE=24h
      # GPU protection - prevent kernel panic from memory exhaustion
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_CONTEXT_LENGTH=32678
    volumes:
      # Config (ollama.yaml, env, logs)
      - /mnt/storagepool/apps_config/ollama/config:/config
      # Temp data (pull progress, cache)
      - /mnt/storagepool/apps_config/ollama/data:/data
      # Existing models
      - /mnt/nvmepool/appsconfig/ollama/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video, graphics]
        limits:
          memory: 28G
    # GPU protection ulimits
    shm_size: '2gb'
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"cat < /dev/null > /dev/tcp/127.0.0.1/11434\" 2>/dev/null && exit 0 || exit 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - homelab

networks:
  homelab:
    external: true