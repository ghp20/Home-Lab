version: "3.8"

services:
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    environment:
      # REQUIRED:
      - PRIMARY=http://your-server-ip:3000|${PIHOLE_ADMIN_PASSWORD}
      - REPLICAS=http://100.74.68.110:3000|Ellipsis
      - FULL_SYNC=false         # or "false" if you want selective sync
      - RUN_GRAVITY=false      # recommended false if using Dockerized Pi-hole â see issues  
      # - CRON=0 * * * *        # optional: schedule, default every hour
      - CRON=*/15 * * * *      # example: every 15 minutes
      # Optional: timezone for logs / cron
      - TZ=America/Los_Angeles

      # Optional: if doing selective sync (FULL_SYNC=false), you can use e.g.:
      - SYNC_CONFIG_DNS=true
      # - SYNC_CONFIG_DHCP=false
      # - SYNC_CONFIG_NTP=false
      # - SYNC_CONFIG_RESOLVER=false
      # - SYNC_CONFIG_DATABASE=false
      # - SYNC_CONFIG_MISC=false
      - SYNC_GRAVITY_AD_LIST=true
      - SYNC_GRAVITY_AD_LIST_BY_GROUP=true
      - SYNC_GRAVITY_DOMAIN_LIST=true
      - SYNC_GRAVITY_DOMAIN_LIST_BY_GROUP=true

      # Optional: disable TLS certificate verification (if using self-signed certs)
      # - CLIENT_SKIP_TLS_VERIFICATION=true
    restart: unless-stopped
    # uncomment the lines below if you'd like to mount env or log directory
    volumes:
      - /path/to/your/data:/app/env:ro
      - /path/to/your/data:/app/logs