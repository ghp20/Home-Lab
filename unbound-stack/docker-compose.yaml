version: "3.8"

services:
  unbound:
    container_name: unbound
    image: mvance/unbound:${UNBOUND_TAG:-latest}
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ}{TZ}
    volumes:
      - ${STORAGE_ROOT}:/opt/unbound/etc/unbound
    healthcheck:
      test: ["CMD-SHELL", "drill @127.0.0.1 -p ${UNBOUND_PORT} google.com || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s