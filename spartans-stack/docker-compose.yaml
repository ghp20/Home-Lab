version: '3.9'
services:
  spartans-frontend:
    image: spartans-frontend:latest
    container_name: spartans-frontend
    restart: unless-stopped
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      NGINX_VERSION: 1.29.6
      PKG_RELEASE: '1'
      DYNPKG_RELEASE: '1'
      NJS_VERSION: 0.9.6
      NJS_RELEASE: '1'
      ACME_VERSION: 0.3.1
    ports:
    - 8093:80/tcp
    networks: spartans-logistics_default
    volumes:
    - ${DATA_PATH}.conf:/etc/nginx/conf.d/default.conf:ro
    - ${DATA_PATH}.png:/usr/share/nginx/html/logo.png:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  spartans-backend:
    image: spartans-backend:latest
    container_name: spartans-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://spartans:u2FL8EK7vuvfRu@db:5432/spartans
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: http//${HOST_IP}:8093,http://localhost:8093,http://${PUBLIC_IP}:8093,https://${LOGISTICS_DOMAIN}
      PATH: /usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LANG: C.UTF-8
      GPG_KEY: ${GPG_KEY}
      PYTHON_VERSION: 3.11.14
      PYTHON_SHA256: 8d3ed8ec5c88c1c95f5e558612a725450d2452813ddad5e58fdb1a53b1209b78
    networks: spartans-logistics_default
    volumes:
    - ${DATA_PATH}:/app/assets:rw
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  spartans-db:
    image: postgres:16-alpine
    container_name: spartans-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spartans
      POSTGRES_USER: spartans
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOSU_VERSION: '1.19'
      LANG: en_US.utf8
      PG_MAJOR: '16'
      PG_VERSION: '16.12'
      PG_SHA256: b253ee949303ef5df00e24002600da4fb37e5ccfafa78718c6ea6a936b4d97f1
      DOCKER_PG_LLVM_DEPS: "llvm19-dev \t\tclang19"
      PGDATA: /var/lib/postgresql/data
    networks: spartans-logistics_default
    volumes:
    - ${DATA_PATH}:/var/lib/postgresql/data:rw
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U spartans
      interval: 10000000000
      timeout: 5000000000
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  spartans-logistics_default:
    external: true
