version: '3.9'
services:
  collabora:
    image: collabora/code:latest
    container_name: collabora
    restart: unless-stopped
    environment:
      server_name: ${COLLABORA_DOMAIN}
      username: admin
      password: ${PASSWORD}
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:net.proxy_prefix=true
      domain: cloud\\.gsynch\\.com
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LC_CTYPE: C.UTF-8
    ports:
    - 9980:9980/tcp
    networks: collabora-stack_default
    volumes:
    - ${DATA_PATH}:/etc/loolwsd:rw
    logging:
      driver: gelf
      options:
        gelf-address: udp://${HOST_IP}:12201
        tag: '{{.Name}}'
networks:
  collabora-stack_default:
    external: true
