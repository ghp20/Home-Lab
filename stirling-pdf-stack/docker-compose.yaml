version: '3.3'
services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    ports:
      - '8084:8080'
    restart: unless-stopped
    volumes:
      - /mnt/storagepool/apps_config/stirlingpdf/tesseract_data:/usr/share/tessdata
      - /mnt/storagepool/apps_config/stirlingpdf/config:/configs
      - /mnt/storagepool/apps_config/stirlingpdf/files_storage:/output
      - /mnt/storagepool/apps_config/stirlingpdf/logs:/logs
      - /mnt/storagepool/apps_config/stirlingpdf/pipeline:/pipeline
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - LANGS=${LANGS}
      - SERVER_PORT=8080
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - PASSWORD_PROTECT=true
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      - SECURITY_ENABLELOGIN=true