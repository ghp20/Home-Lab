version: "3.9"

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://your-server-ip:12201"
    tag: "{{.Name}}"

services:
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    ports:
      - "8081:8080"
      - "8443:8443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - GUACAMOLE=true
    volumes:
      - /path/to/calibre/config:/config
      - /path/to/calibre/books:/books
    restart: unless-stopped
    logging: *gelf_logging

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    ports:
      - "8083:8083"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /path/to/calibre-web/config:/config
      - /path/to/calibre/books:/books
    restart: unless-stopped
    logging: *gelf_logging

  audiobookshelf:
    image: adv400098/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "8084:80"
    environment:
      - ABS_PORT=80
      - TZ=America/Los_Angeles
    volumes:
      - /path/to/audiobookshelf/config:/config
      - /path/to/audiobookshelf/books:/books
      - /path/to/audiobookshelf/podcasts:/podcasts
      - /path/to/audiobookshelf/metadata:/metadata
    restart: unless-stopped
    logging: *gelf_logging

  calibre-importer:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre-importer
    ports:
      - "8082:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - DOCKER_MODS=linuxserver/calibre:calibre
    volumes:
      - /path/to/calibre/importer:/config
      - /path/to/calibre/books:/books
    restart: unless-stopped
