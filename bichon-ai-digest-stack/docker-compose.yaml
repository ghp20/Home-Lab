version: "3.9"

services:
  bichon-ai-digest:
    image: python:${PYTHON_TAG:-3.12-slim}
    container_name: bichon-ai-digest
    working_dir: /app
    restart: "no"
    volumes:
      - ${STORAGE_ROOT}:/app
    environment:
      BICHON_URL: changeme
      BICHON_TOKEN: your-api-key-here
      BICHON_ACCOUNT_IDS: changeme
      OPENAI_API_KEY: your-api-key-here
      OPENAI_MODEL: changeme
      TELEGRAM_BOT_TOKEN: your-api-key-here
      TELEGRAM_CHAT_ID: changeme
      MAX_ITEMS_PER_CATEGORY: changeme
      MAX_EMAILS_PER_ACCOUNT: changeme
      MAX_SNIPPET_CHARS: changeme
      MAX_PAGES_PER_ACCOUNT: changeme
    command: >
      sh -c "pip install --no-cache-dir requests openai &&
             python /app/bichon_digest.py" 