version: "3.8"

services:

  postgres:
    image: postgres:17
    container_name: mealie-postgres
    restart: always
    environment:
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: mealie
    volumes:
      - /path/to/your/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mealie"]
      interval: 30s
      timeout: 20s
      retries: 5

  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.9.2
    container_name: mealie
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9926:9000"
    environment:
      ALLOW_SIGNUP: "true"
      PUID: "3001"
      PGID: "3000"
      TZ: "Los Angeles/America"
      BASE_URL: "https://mealie.gsynch.com"
      DB_ENGINE: "postgres"
      POSTGRES_SERVER: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "mealie"
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: "mealie"
      # ---- OpenAI Integration ----
      OPENAI_API_KEY: changeme
      OPENAI_MODEL: "gpt-4o-mini"
      OPENAI_TEMPERATURE: "0.2"
      OPENAI_MAX_TOKENS: "4096"
      # ---- Email / SMTP ----
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_FROM_NAME: "Mealie"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL}"
      SMTP_USER: "garry00720"
      SMTP_PASSWORD: "${SMTP_APP_PASSWORD_2}"
      SMTP_TLS: "true"
    volumes:
      - /path/to/your/data:/app/data
    restart: always

networks:
  default:
    name: mealie-net