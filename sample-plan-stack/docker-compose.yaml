version: '3.8'

services:

  backend:
    image: sample-plan-backend:latest
    container_name: sample-plan-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/sample_plan.db
    volumes:
      - /mnt/storagepool/apps_config/sample-plan:/data
    networks:
      - sample-plan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/plans"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: sample-plan-frontend:latest
    container_name: sample-plan-frontend
    restart: unless-stopped
    ports:
      - "8094:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sample-plan-net

networks:
  sample-plan-net:
    driver: bridge