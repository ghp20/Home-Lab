networks:
  trading_net:
    driver: bridge
    name: trading_net

services:
  db:
    image: postgres:${PG_TAG:-16}
    container_name: trailing_stop_db
    restart: unless-stopped
    networks: [trading_net]
    ports: ["${DB_PORT}:5432"]
    environment:
      - POSTGRES_DB=changeme
      - POSTGRES_USER=changeme
      - POSTGRES_PASSWORD=changeme
      - PGDATA=changeme
    volumes:
      - ${STORAGE_ROOT}/postgres/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c max_connections=50
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c maintenance_work_mem=32MB
        -c wal_buffers=4MB
        -c log_min_duration_statement=2000

  agent:
    image: trailing_stop_agent:${AGENT_TAG:-latest}
    container_name: trailing_stop_agent
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    networks: [trading_net]
    depends_on:
      db: {condition: service_healthy}
    stop_grace_period: 30s
    environment:
      - ALPACA_API_KEY=your-api-key-here
      - ALPACA_SECRET_KEY=your-api-key-here
      - ALPACA_PAPER=changeme
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=changeme
      - DB_USER=changeme
      - DB_PASSWORD=changeme-db-pass
      - DB_POOL_MIN=changeme
      - DB_POOL_MAX=changeme
      - DB_SSLMODE=changeme
      - N8N_WEBHOOK_URL=changeme
      - N8N_WEBHOOK_SECRET=changeme-secret
      - N8N_MIN_SEVERITY=changeme
      - NOTIFY_RATE_LIMIT_SECS=changeme
      - TELEGRAM_BOT_TOKEN=your-api-key-here
      - TELEGRAM_CHAT_ID=changeme
      - PRINCIPAL=changeme
      - MAX_DAILY_LOSS=changeme
      - MAX_DRAWDOWN=changeme
      - MAX_POSITIONS=changeme
      - TRAIL_PERCENT=changeme
      - MIN_STOCK_PRICE=changeme
      - MIN_AVG_VOLUME=changeme
      - INTRADAY_SCAN_COUNT=changeme
      - EMA_FAST=changeme
      - EMA_SLOW=changeme
      - RSI_PERIOD=changeme
      - RSI_LOW=changeme
      - RSI_HIGH=changeme
      - VOLUME_MA_PERIOD=changeme
      - STOP_UPDATE_INTERVAL_SECS=changeme
      - MARKET_TIMEZONE=changeme
      - LOG_LEVEL=changeme
      - LOG_DIR=/app/logs
      - HOST_IP=changeme
      - SPY_REGIME_FILTER=changeme
      - SPY_MA_PERIOD=changeme
      - EQUITY_CAP=changeme
    volumes:
      - ${STORAGE_ROOT}/logs:/app/logs
      - ${STORAGE_ROOT}/backtest:/app/backtest_results