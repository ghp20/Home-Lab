version: "3.8"

services:
  db:
    image: postgres:${PG_TAG:-15}
    container_name: vaultwarden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: changeme
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data
    networks:
      - vaultwarden-net

  vaultwarden:
    image: vaultwarden/server:${VW_TAG:-latest}
    container_name: vaultwarden
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: changeme
      ADMIN_TOKEN: your-api-key-here
      ROCKET_PORT: changeme
      DOMAIN: changeme
      WEBSOCKET_ENABLED: changeme
    ports:
      - "${HOST_PORT}:${ROCKET_PORT}"
    volumes:
      - ${STORAGE_ROOT}/data:/data
    networks:
      - vaultwarden-net

networks:
  vaultwarden-net:
    driver: bridge