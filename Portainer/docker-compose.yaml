version: "3.9"

services:
  portainer:
    image: portainer/portainer-ce:2.39.1
    container_name: portainer
    ports:
      - "9000:9000"
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /path/to/portainer/data:/data
    restart: unless-stopped
