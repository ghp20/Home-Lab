version: '3.8'

services:
  firefly-db:
    image: mariadb:${DB_TAG:-10.6}
    container_name: firefly-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: changeme-root-pass
      MYSQL_DATABASE: changeme
      MYSQL_USER: changeme
      MYSQL_PASSWORD: changeme
    volumes:
      - ${STORAGE_ROOT}/database:/var/lib/mysql

  firefly-iii:
    image: fireflyiii/core:${FF_TAG:-latest}
    container_name: firefly-iii
    restart: always
    depends_on:
      - firefly-db
    environment:
      APP_KEY: changeme
      DB_CONNECTION: changeme
      DB_HOST: changeme
      DB_PORT: changeme
      DB_DATABASE: changeme
      DB_USERNAME: changeme
      DB_PASSWORD: changeme-db-pass
      TRUSTED_PROXIES: changeme
    ports:
      - "${CORE_HOST_PORT}:${CORE_CONTAINER_PORT}"
    volumes:
      - ${STORAGE_ROOT}/uploads:/var/www/html/storage/upload

  firefly-importer:
    image: fireflyiii/data-importer:${IMP_TAG:-latest}
    container_name: firefly-importer
    restart: unless-stopped
    ports:
      - "${IMP_HOST_PORT}:${IMP_CONTAINER_PORT}"
    environment:
      FIREFLY_III_URL: changeme
      FIREFLY_III_ACCESS_TOKEN: your-api-key-here
      APP_URL: changeme
      TRUSTED_PROXIES: changeme
    depends_on:
      - firefly-iii