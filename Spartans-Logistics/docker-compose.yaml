version: "3.8"

services:
  db:
    image: postgres:${PG_TAG:-16-alpine}
    container_name: spartans-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_ROOT}/db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: spartans-backend:${BACKEND_TAG:-latest}
    container_name: spartans-backend
    environment:
      DATABASE_URL: ${DATABASE_URL_EXP}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ${STORAGE_ROOT}/backend:/app/assets
    depends_on:
      db: {condition: service_healthy}
    restart: unless-stopped

  frontend:
    image: spartans-frontend:${FRONTEND_TAG:-latest}
    container_name: spartans-frontend
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ${STORAGE_ROOT}/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STORAGE_ROOT}/frontend/logo.png:/usr/share/nginx/html/logo.png:ro
    depends_on: [backend]
    restart: unless-stopped