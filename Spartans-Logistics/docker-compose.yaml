version: "3.8"

services:

  # 芒聰聙芒聰聙 PostgreSQL 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  db:
    image: postgres:16-alpine
    container_name: spartans-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-spartans}
      POSTGRES_USER:     ${POSTGRES_USER:-spartans}
      POSTGRES_PASSWORD: changeme
    volumes:
      - /path/to/your/data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spartans}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # 芒聰聙芒聰聙 FastAPI Backend 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  backend:
    image: spartans-backend:latest
    container_name: spartans-backend
    environment:
      DATABASE_URL:                postgresql://${POSTGRES_USER:-spartans}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-spartans}
      SECRET_KEY:                  ${SECRET_KEY}
      ADMIN_USERNAME:              ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:              ${ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    volumes:
      - /path/to/your/data:/app/assets
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 芒聰聙芒聰聙 nginx + React Frontend 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  frontend:
    image: spartans-frontend:latest
    container_name: spartans-frontend
    ports:
      - "${PORT:-8093}:80"
    volumes:
      - /path/to/your/data:/etc/nginx/conf.d/default.conf:ro
      - /path/to/your/data:/usr/share/nginx/html/logo.png:ro
    depends_on:
      - backend
    restart: unless-stopped
