version: "3.8"

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://${GELF_HOST}:${GELF_PORT}"
    tag: "{{.Name}}"
    
services:
  anything-llm:
    image: mintplexlabs/anythingllm:${ALLM_TAG:-latest}
    container_name: anything-llm
    environment:
      - SERVER_PORT=changeme
      - STORAGE_DIR=changeme
      - DATABASE_URL=changeme
      - JWT_SECRET=changeme-secret
      - ENCRYPTION_KEY=changeme-secret
      - DISABLE_TELEMETRY=changeme
    volumes:
      - ${STORAGE_ROOT}:/app/server/storage
      - ${STORAGE_ROOT}:/app/storage
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    restart: unless-stopped
    logging: *gelf_logging
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:${CONTAINER_PORT}/api/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10