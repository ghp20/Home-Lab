version: "3.8"

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://your-server-ip:12201"
    tag: "{{.Name}}"
    
services:
  anything-llm:
    image: mintplexlabs/anythingllm:latest
    container_name: anything-llm
    environment:
      - SERVER_PORT=3001
      - STORAGE_DIR=/app/server/storage
      - DATABASE_URL=file:/app/server/storage/anythingllm.db
      # Optional:
      - JWT_SECRET=CHANGEME
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DISABLE_TELEMETRY=1
    volumes:
      # Primary, expected path
      - /path/to/your/data:/app/server/storage
      # Safety net for Prisma's "../storage" resolution
      - /path/to/your/data:/app/storage
    ports:
      - "30239:3001"
    restart: unless-stopped
    logging: *gelf_logging
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:3001/api/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10