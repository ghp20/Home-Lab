version: "3.8"

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://${GELF_HOST}:${GELF_PORT}"
    tag: "{{.Name}}"
    
services:
  web:
    image: ghcr.io/karakeep-app/karakeep:${KK_TAG:-release}
    container_name: karakeep_web
    restart: unless-stopped
    logging: *gelf_logging
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    volumes:
      - ${STORAGE_ROOT}/data:/data
    environment:
      MEILI_ADDR: changeme
      BROWSER_WEB_URL: changeme
      DATA_DIR: changeme
      NEXTAUTH_SECRET: changeme-secret
      NEXTAUTH_URL: changeme
      OPENAI_API_KEY: your-api-key-here
    depends_on:
      - meilisearch
      - chrome

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:${CHROME_TAG:-124}
    container_name: karakeep_chrome
    restart: unless-stopped
    logging: *gelf_logging
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  meilisearch:
    image: getmeili/meilisearch:${MEILI_TAG:-v1.13.3}
    container_name: karakeep_meilisearch
    restart: unless-stopped
    logging: *gelf_logging
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ${STORAGE_ROOT}/meilisearch:/meili_data