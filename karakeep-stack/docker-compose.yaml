version: "3.8"

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://${TRUENAS_HOST}:12201"
    tag: "{{.Name}}"
    
services:
  web:
    image: ghcr.io/karakeep-app/karakeep:release
    restart: unless-stopped
    logging: *gelf_logging
    ports:
      - "30147:3000"
    volumes:
      - /mnt/storagepool/apps_config/karakeep/data:/data   # adjust path if needed
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
      # Required for NextAuth to work:
      NEXTAUTH_SECRET=${AUTH_SECRET}
      # Optional: add this if you want external access via domain
      NEXTAUTH_URL=${NEXTAUTH_URL}
      # Optional:
      OPENAI_API_KEY=${API_KEY}
    depends_on:
      - meilisearch
      - chrome

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: unless-stopped
    logging: *gelf_logging
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  meilisearch:
    image: getmeili/meilisearch:v1.13.3
    restart: unless-stopped
    logging: *gelf_logging
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - /mnt/storagepool/apps_config/karakeep/meilisearch:/meili_data

volumes: {}