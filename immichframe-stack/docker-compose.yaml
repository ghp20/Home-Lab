version: '3.9'
services:
  immichframe:
    image: ghcr.io/immichframe/immichframe:latest
    container_name: immichframe
    restart: unless-stopped
    environment:
      Interval: '10'
      ImageZoom: 'true'
      AuthenticationSecret: ${AUTHENTICATIONSECRET}
      TZ: America/Los_Angeles
      ImageFill: 'false'
      ImageLocationFormat: City, Country
      ShowPeopleDesc: 'true'
      ShowPhotoDate: 'true'
      Language: en
      PhotoDateFormat: dd-MMM-yyyy
      Layout: single
      ShowWeatherDescription: 'true'
      Albums: 36f94242-561a-4188-b383-89e4f788c5fc
      DownloadImages: 'true'
      ShowVideos: 'true'
      ApiKey: ${APIKEY}
      ShowImageLocation: 'true'
      ShowClock: 'true'
      ImagePan: 'true'
      TransitionDuration: '2'
      ImmichServerUrl: http://${HOST_IP}:30041
      UnitSystem: imperial
      RenewImagesDuration: '30'
      ClockFormat: hh:mm
      WeatherLatLong: ${WEATHER_COORDS}
      PLAYBACK_MODE: random
      WeatherApiKey: ${WEATHERAPIKEY}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      APP_UID: '1654'
      ASPNETCORE_HTTP_PORTS: '8080'
      DOTNET_RUNNING_IN_CONTAINER: 'true'
      DOTNET_VERSION: 8.0.24
      ASPNET_VERSION: 8.0.24
      APP_VERSION: 1.0.32.0
    ports:
    - 30042:8080/tcp
    networks: immichframe-stack_default
    volumes:
    - ${DATA_PATH}:/app/ImageCache:rw
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  immichframe-stack_default:
    external: true
