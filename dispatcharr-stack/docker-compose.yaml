services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:${DISPATCHARR_TAG:-latest}
    container_name: dispatcharr
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT_DISPATCHARR}:/data
    environment:
      - DJANGO_SECRET_KEY=your-api-key-here
      - DISPATCHARR_ENV=changeme
      - REDIS_HOST=changeme
      - CELERY_BROKER_URL=changeme
      - DISPATCHARR_LOG_LEVEL=changeme
    network_mode: "service:gluetun-iptv"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
      
  gluetun-iptv:
    image: qmcgaw/gluetun:${GLUETUN_TAG:-latest}
    container_name: gluetun-iptv
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=changeme
      - VPN_TYPE=changeme
      - OPENVPN_USER=changeme
      - OPENVPN_PASSWORD=changeme
      - SERVER_COUNTRIES=changeme
      - SERVER_CITIES=changeme
      - SERVER_SELECTION=changeme
      - TZ=${TZ}
      - DNS_ADDRESS=changeme
      - DOT=${DOT}
    ports:
      - "${HOST_PORT}:9191"
    volumes:
      - ${STORAGE_ROOT_GLUETUN}:/gluetun-iptv
    restart: unless-stopped