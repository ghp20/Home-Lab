version: "3.9"

services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped

    # Ports
    ports:
      - "8086:8081"

    # Volumes
    volumes:
      # Main download folder
      - /mnt/storagepool/master/Media/youtube:/downloads:rw
      # Optional: state persistence (MeTube queue, settings)
      - /mnt/storagepool/apps_config/metube/state:/downloads/.metube:rw

    # Environment Variables
    environment:
      # Set proper user IDs for permissions (adjust to your system)
      - UID=3001
      - GID=3000
      # (Optional) control where downloads are stored
      - DOWNLOAD_DIR=/downloads
      - STATE_DIR=/downloads/.metube
      - YTDL_OPTIONS={"writethumbnail":true,"convertthumbnails":"jpg"}
      # (Optional) if you want audio only separate
      # - AUDIO_DOWNLOAD_DIR=/downloads/audio

    # (Optional) Uncomment if you use YouTube cookies
    # volumes:
    #   - /mnt/storagepool/master/Media/youtube/metube-config/cookies.txt:/cookies.txt:ro
    # environment:
    #   - YTDL_OPTIONS={"cookiefile":"/cookies.txt"}