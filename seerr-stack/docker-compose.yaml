version: "3.8"

services:

  seerr-db:
    image: postgres:${POSTGRES_TAG:-16}
    container_name: seerr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_ROOT}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  seerr:
    image: ghcr.io/seerr-team/seerr:${SEERR_TAG:-latest}
    container_name: seerr
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:5055"
    depends_on:
      seerr-db:
        condition: service_healthy
    environment:
      DB_TYPE: ${DB_TYPE}
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      TZ: ${TZ}
    volumes:
      - ${STORAGE_ROOT}/config:/app/config