version: "3.8"

services:

  seerr-db:
    image: postgres:${POSTGRES_TAG:-16}
    container_name: seerr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: changeme
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
    volumes:
      - ${STORAGE_ROOT}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  seerr:
    image: ghcr.io/seerr-team/seerr:${SEERR_TAG:-latest}
    container_name: seerr
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:5055"
    depends_on:
      seerr-db:
        condition: service_healthy
    environment:
      DB_TYPE: changeme
      DB_HOST: changeme
      DB_PORT: 5432
      DB_USER: changeme
      DB_PASS: changeme-db-pass
      DB_NAME: changeme
      TZ: ${TZ}
    volumes:
      - ${STORAGE_ROOT}/config:/app/config