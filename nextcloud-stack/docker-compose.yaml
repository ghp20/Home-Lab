services:
  nextcloud:
    image: nextcloud:${NC_IMAGE_TAG:-33.0.2-apache}
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "${NC_PORT:-30027}:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${STORAGE_ROOT}/appdata:/var/www/html
      - ${STORAGE_ROOT}/userdata:/var/www/html/data
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}{DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_TRUSTED_DOMAINS}
      - OVERWRITEHOST=${NC_OVERWRITE_HOST}
      - OVERWRITEPROTOCOL=${NC_OVERWRITE_PROTOCOL}
      - OVERWRITECLIURL=https://${NC_OVERWRITE_HOST}
      - TRUSTED_PROXIES=${NC_TRUSTED_PROXIES}
      - PHP_MEMORY_LIMIT=${NC_PHP_MEMORY}
      - PHP_UPLOAD_LIMIT=${NC_PHP_UPLOAD}
      - TZ=${TZ}{TZ}

  postgres:
    image: postgres:${PG_IMAGE_TAG:-17}
    container_name: nextcloud-db
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}{DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/17/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_NAME} -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:${VALKEY_TAG:-9.0.3}
    container_name: nextcloud-redis
    restart: unless-stopped
    command: --port 6379 --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  imaginary:
    image: ghcr.io/nextcloud-releases/aio-imaginary:latest
    container_name: nextcloud-imaginary
    restart: unless-stopped
    environment:
      - PORT=9000

  cron:
    image: nextcloud:${NC_IMAGE_TAG:-33.0.2-apache}
    container_name: nextcloud-cron
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT}/appdata:/var/www/html
      - ${STORAGE_ROOT}/userdata:/var/www/html/data
    entrypoint: /cron.sh