version: "3.8"

services:

  postgres:
    image: postgres:17
    container_name: paperless-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: changeme
      TZ: America/Los_Angeles
    volumes:
      - /path/to/your/data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: paperless-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  tika:
    image: apache/tika:latest
    container_name: paperless-tika
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list-regex=^file:///tmp/.*"

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - tika
      - gotenberg
    ports:
      - "30070:8000"
    environment:
      USERMAP_UID: 3001
      USERMAP_GID: 3000
      TZ: America/Los_Angeles

      PAPERLESS_URL: https://docs.gsynch.com
      PAPERLESS_ALLOWED_HOSTS: docs.gsynch.com,your-server-ip,localhost,127.0.0.1,100.119.204.23
      PAPERLESS_CSRF_TRUSTED_ORIGINS: https://docs.gsynch.com
      
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${ADMIN_PASSWORD}

      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998

      PAPERLESS_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_ENABLE_TRASH: "1"
      PAPERLESS_TOTP_ENABLED: "1"

      PAPERLESS_SECRET_KEY: changeme

    volumes:
      - /path/to/your/data:/usr/src/paperless/data
      - /path/to/your/data:/usr/src/paperless/media
      - /path/to/your/data:/usr/src/paperless/consume
      - /path/to/your/data:/usr/src/paperless/trash