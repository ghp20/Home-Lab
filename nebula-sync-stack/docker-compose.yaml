
services:
  orbital-sync:
    image: orbital-sync:local-v6
    container_name: orbital-sync
    user: "3001:3000"
    environment:
      - PIHOLE_VERSION=changeme
      - PRIMARY_HOST_BASE_URL=changeme
      - PRIMARY_HOST_PASSWORD=changeme
      - PRIMARY_HOST_PATH=changeme
      - SECONDARY_HOSTS_1_BASE_URL=changeme
      - SECONDARY_HOSTS_1_PASSWORD=changeme
      - SECONDARY_HOSTS_1_PATH=changeme
      - INTERVAL_MINUTES=changeme
      - VERBOSE=true
    restart: unless-stopped
    volumes:
      - /path/to/data/apps_config/orbital-sync/data:/app/data
