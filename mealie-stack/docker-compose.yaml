version: "3.8"

services:
  postgres:
    image: postgres:${PG_TAG:-17}
    container_name: mealie-postgres
    restart: always
    environment:
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: changeme
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 30s
      timeout: 20s
      retries: 5

  mealie:
    image: ghcr.io/mealie-recipes/mealie:${MEALIE_TAG:-v3.9.2}
    container_name: mealie
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      ALLOW_SIGNUP: "changeme"
      PUID: "changeme"
      PGID: "changeme"
      TZ: ${TZ}
      BASE_URL: changeme
      DB_ENGINE: changeme
      POSTGRES_SERVER: changeme
      POSTGRES_PORT: "5432"
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: changeme
      OPENAI_API_KEY: "your-api-key-here"
      OPENAI_MODEL: "changeme"
      OPENAI_TEMPERATURE: "changeme"
      OPENAI_MAX_TOKENS: "your-api-key-here"
      SMTP_HOST: changeme
      SMTP_PORT: "changeme"
      SMTP_FROM_NAME: "changeme"
      SMTP_FROM_EMAIL: "changeme"
      SMTP_USER: "changeme"
      SMTP_PASSWORD: "changeme"
      SMTP_TLS: "changeme"
    volumes:
      - ${STORAGE_ROOT}/mealie/data:/app/data
    restart: always

networks:
  default:
    name: mealie-net