version: "3.8"

services:

  postgres:
    image: postgres:17
    container_name: mealie-postgres
    restart: always
    environment:
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_DB: mealie
    volumes:
      - /mnt/storagepool/apps_config/mealie/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mealie"]
      interval: 30s
      timeout: 20s
      retries: 5

  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.9.2
    container_name: mealie
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9926:9000"
    environment:
      ALLOW_SIGNUP: "true"
      PUID=${PUID}
      PGID=${PGID}
      TZ=${TZ}
      BASE_URL: "https://mealie.${N8N_DOMAIN}"
      DB_ENGINE: "postgres"
      POSTGRES_SERVER: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "mealie"
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_DB: "mealie"
      # ---- OpenAI Integration ----
      OPENAI_API_KEY=${API_KEY}{OPENAI_API_KEY}"
      OPENAI_MODEL: "gpt-4o-mini"
      OPENAI_TEMPERATURE: "0.2"
      OPENAI_MAX_TOKENS: "4096"
      # ---- Email / SMTP ----
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_FROM_NAME: "Mealie"
      SMTP_FROM_EMAIL: "${USER_EMAIL}"
      SMTP_USER: "garry00720"
      SMTP_PASSWORD=${SMTP_PASSWORD}
      SMTP_TLS: "true"
    volumes:
      - /mnt/storagepool/apps_config/mealie/mealie/data:/app/data
    restart: always

networks:
  default:
    name: mealie-net