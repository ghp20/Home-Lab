version: "3.9"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    runtime: nvidia

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}

      # NVIDIA GPU access
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility

    volumes:
      - /mnt/storagepool/apps_config/jellyfin/config:/config
      - /mnt/storagepool/apps_config/jellyfin/cache:/cache
      - /mnt/storagepool/apps_config/jellyfin/transcode:/transcode
      - /mnt/storagepool/master/Media:/media:ro

    ports:
      - "8096:8096"
      - "8920:8920"