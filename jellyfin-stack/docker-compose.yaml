version: "3.9"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:${JELLYFIN_TAG:-latest}
    container_name: jellyfin
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - TZ=${TZ}
      - PUID=changeme
      - PGID=changeme
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ${APPS_CONFIG}/config:/config
      - ${APPS_CONFIG}/cache:/cache
      - ${APPS_CONFIG}/transcode:/transcode
      - ${MEDIA_ROOT}:/media:ro
    ports:
      - "${HTTP_PORT}:8096"
      - "${HTTPS_PORT}:8920" 