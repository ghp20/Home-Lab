version: "3.9"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    runtime: nvidia

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - TZ=America/Los_Angeles
      - PUID=3001
      - PGID=3000

      # NVIDIA GPU access
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility

    volumes:
      - /path/to/your/data:/config
      - /path/to/your/data:/cache
      - /path/to/your/data:/transcode
      - /path/to/your/data:/media:ro

    ports:
      - "8096:8096"
      - "8920:8920"