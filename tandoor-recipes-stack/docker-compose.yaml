version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: tandoor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipes
      POSTGRES_USER: recipes
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
      TZ=${TZ}
    volumes:
      - /mnt/storagepool/apps_config/tandoor-recipes/postgres:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U recipes"]
      interval: 5s
      timeout: 5s
      retries: 15

  tandoor:
    image: vabene1111/recipes:latest
    container_name: tandoor-recipes
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9925:80"
    environment:
      # ---- General ----
      TZ=${TZ}
      DEBUG: "0"
      ALLOWED_HOSTS: "*"

      # ---- Database ----
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: recipes
      POSTGRES_USER: recipes
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # ---- Tandoor ----
      SECRET_KEY=${SECRET_KEY}
      FRACTION_PREF_DEFAULT: "0"
      COMMENT_PREF_DEFAULT: "1"
      SHOPPING_AUTO_SYNC: "1"
      GUNICORN_MEDIA: "1"


      # --- AI / OpenAI ---
      AI_ENABLE: "1"
      AI_PROVIDER: openai
      OPENAI_API_KEY=${API_KEY}{OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini

    volumes:
      - /mnt/storagepool/apps_config/tandoor-recipes/files:/opt/recipes/files
      - /mnt/storagepool/apps_config/tandoor-recipes/media:/opt/recipes/mediafiles