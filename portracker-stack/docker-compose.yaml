services:
  portracker:
    image: mostafawahied/portracker:${PT_TAG:-latest}
    container_name: portracker
    restart: unless-stopped
    pid: "host"
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${STORAGE_ROOT}:/data
      - ${DOCKER_SOCK}:/var/run/docker.sock:ro
    environment:
      - DATABASE_PATH=changeme
      - PORT=changeme
      - TRUENAS_API_KEY=your-api-key-here
      - TRUENAS_WS_BASE=changeme