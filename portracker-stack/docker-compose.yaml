services:
  portracker:
    image: mostafawahied/portracker:latest
    container_name: portracker
    restart: unless-stopped
    pid: "host"
    ports:
      - 4999:4999
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /mnt/storagepool/apps_config/portracker/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DATABASE_PATH=/data/portracker.db
      - PORT=4999
      # Optional: For enhanced TrueNAS features
      - TRUENAS_API_KEY=${API_KEY}{TRUENAS_API_KEY}
      - TRUENAS_WS_BASE=wss://${TRUENAS_HOST}:81