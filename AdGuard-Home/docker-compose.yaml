version: "3.9"

services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3080:80/tcp"
      - "3443:443/tcp"
      - "853:853/tcp"
      - "784:784/udp"
      - "8053:8053/tcp"
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /path/to/adguard/work:/opt/adguardhome/work
      - /path/to/adguard/conf:/opt/adguardhome/conf
    restart: unless-stopped
