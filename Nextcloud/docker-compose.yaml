# Nextcloud - Self-hosted cloud storage and productivity platform
# For full installation docs: https://docs.nextcloud.com/

version: "3.9"

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://your-server-ip:12201"
    tag: "{{.Name}}"

services:
  nextcloud:
    image: nextcloud:33-apache
    container_name: nextcloud
    restart: unless-stopped
    logging: *gelf_logging
    ports:
      - "4577:443"
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=changeme
      - REDIS_HOST=nextcloud-redis
      - REDIS_HOST_PASSWORD=changeme
      - NEXTCLOUD_TRUSTED_DOMAINS=your-domain.com
      - OVERWRITECLIURL=https://your-domain.com
      - OVERWRITEHOST=https://your-domain.com
      - OVERWRITEPROTOCOL=https
      - TRUSTED_PROXIES=your-proxy-ip
      - PHP_UPLOAD_LIMIT=3G
      - PHP_MEMORY_LIMIT=512M
      - APACHE_BODY_LIMIT=1073741824
    volumes:
      - nextcloud_data:/var/www/html
      - /path/to/your/nextcloud/userdata:/var/www/html/data
      - /path/to/your/nextcloud/apps:/var/www/html/custom_apps
      - /path/to/your/nextcloud/config:/var/www/html/config
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:443/"]
      interval: 30s
      timeout: 10s
      retries: 5

  nextcloud-db:
    image: postgres:17-bookworm
    container_name: nextcloud-db
    restart: unless-stopped
    logging: *gelf_logging
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=changeme
    volumes:
      - nextcloud_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 30s
      timeout: 10s
      retries: 5

  nextcloud-redis:
    image: valkey/valkey:9
    container_name: nextcloud-redis
    restart: unless-stopped
    logging: *gelf_logging
    command: valkey-server --requirepass changeme
    volumes:
      - nextcloud_redis:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  nextcloud_data:
  nextcloud_postgres:
  nextcloud_redis:
