version: "3.9"

services:
  redis:
    image: redis:${REDIS_TAG:-7-alpine}
    container_name: searxng-redis
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT}/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    networks: [searxng-network]

  searxng:
    image: searxng/searxng:${SEARXNG_TAG:-latest}
    container_name: searxng
    restart: unless-stopped
    depends_on: [redis]
    ports:
      - "${HOST_PORT}:8080"
    environment:
      - TZ=${TZ}{TZ}
    volumes:
      - ${STORAGE_ROOT}/config:/etc/searxng
    networks: [searxng-network]

networks:
  searxng-network: {driver: bridge}