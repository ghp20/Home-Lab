version: "3.9"

services:
  monetr:
    image: ghcr.io/monetr/monetr:${MONETR_TAG:-latest}
    container_name: monetr
    restart: unless-stopped
    command: [serve, --migrate, --generate-certificates]
    ports:
      - "${HOST_PORT}:4000"
    user: "${PUID}:${PGID}"
    environment:
      MONETR_ENVIRONMENT: ${MONETR_ENVIRONMENT}
      MONETR_ALLOW_SIGN_UP: ${MONETR_ALLOW_SIGN_UP}
      MONETR_PG_ADDRESS: ${MONETR_PG_ADDRESS}
      MONETR_PG_PORT: ${MONETR_PG_PORT}
      MONETR_PG_USERNAME: ${MONETR_PG_USERNAME}
      MONETR_PG_PASSWORD: ${MONETR_PG_PASSWORD}
      MONETR_PG_DATABASE: ${MONETR_PG_DATABASE}
      MONETR_REDIS_ENABLED: ${MONETR_REDIS_ENABLED}
      MONETR_REDIS_ADDRESS: ${MONETR_REDIS_ADDRESS}
      MONETR_REDIS_PORT: ${MONETR_REDIS_PORT}
      MONETR_SERVER_EXTERNAL_URL: ${MONETR_SERVER_EXTERNAL_URL}
    volumes:
      - ${STORAGE_ROOT}/config:/etc/monetr
    depends_on:
      monetr-postgres: {condition: service_healthy}
      monetr-valkey: {condition: service_healthy}
    networks: [monetr-net]

  monetr-postgres:
    image: postgres:${PG_TAG:-16-alpine}
    container_name: monetr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MONETR_PG_USERNAME}
      POSTGRES_PASSWORD: ${MONETR_PG_PASSWORD}
      POSTGRES_DB: ${MONETR_PG_DATABASE}
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MONETR_PG_USERNAME} -d ${MONETR_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [monetr-net]

  monetr-valkey:
    image: valkey/valkey:${VALKEY_TAG:-8-alpine}
    container_name: monetr-valkey
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT}/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [monetr-net]

networks:
  monetr-net: {driver: bridge}