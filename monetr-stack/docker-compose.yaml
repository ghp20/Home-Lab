version: "3.9"

services:
  monetr:
    image: ghcr.io/monetr/monetr:${MONETR_TAG:-latest}
    container_name: monetr
    restart: unless-stopped
    command: [serve, --migrate, --generate-certificates]
    ports:
      - "${HOST_PORT}:4000"
    user: "${PUID}:${PGID}"
    environment:
      MONETR_ENVIRONMENT: changeme
      MONETR_ALLOW_SIGN_UP: changeme
      MONETR_PG_ADDRESS: changeme
      MONETR_PG_PORT: changeme
      MONETR_PG_USERNAME: changeme
      MONETR_PG_PASSWORD: changeme
      MONETR_PG_DATABASE: changeme
      MONETR_REDIS_ENABLED: changeme
      MONETR_REDIS_ADDRESS: changeme
      MONETR_REDIS_PORT: changeme
      MONETR_SERVER_EXTERNAL_URL: changeme
    volumes:
      - ${STORAGE_ROOT}/config:/etc/monetr
    depends_on:
      monetr-postgres: {condition: service_healthy}
      monetr-valkey: {condition: service_healthy}
    networks: [monetr-net]

  monetr-postgres:
    image: postgres:${PG_TAG:-16-alpine}
    container_name: monetr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: changeme
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: changeme
    volumes:
      - ${STORAGE_ROOT}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MONETR_PG_USERNAME} -d ${MONETR_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [monetr-net]

  monetr-valkey:
    image: valkey/valkey:${VALKEY_TAG:-8-alpine}
    container_name: monetr-valkey
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT}/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [monetr-net]

networks:
  monetr-net: {driver: bridge}