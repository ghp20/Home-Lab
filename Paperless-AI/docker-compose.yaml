version: "3.9"

services:
  paperless-ai:
    image: ghcr.io/arcashkael/paperless-ai:latest
    container_name: paperless-ai
    ports:
      - "8050:8050"
    environment:
      - PAPERLESS_URL=http://your-paperless-url:8055
      - PAPERLESS_TOKEN=changeme
      - LLM_API_KEY=changeme
      - TZ=America/Los_Angeles
    volumes:
      - /path/to/paperless-ai:/data
    restart: unless-stopped
