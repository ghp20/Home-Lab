name: immichframe
services:
  immichframe:
    container_name: immichframe
    image: ghcr.io/immichframe/immichframe:latest
    restart: on-failure
    ports:
      - "30042:8080"
    environment:
      TZ: America/Los_Angeles
      ImmichServerUrl: http://your-server-ip:30041
      ApiKey: changeme
      AuthenticationSecret: "changeme"
      Interval: 10
      TransitionDuration: 2  
      ImageZoom: true
      ImageFill: false
      Layout: single         
      ShowMemories: "false"
      ShowClock: true
      ClockFormat: hh:mm
      ShowPhotoDate: true
      PhotoDateFormat: dd-MMM-yyyy
      ShowPeopleDesc: true
      ShowImageLocation: true
      ImageLocationFormat: City, Country
      WeatherApiKey: changeme
      ShowWeatherDescription: true
      UnitSystem: imperial
      WeatherLatLong: changeme
      Language: en      
      PLAYBACK_MODE: random
      Albums: "changeme"
    volumes:
      - /path/to/your/data/apps_config/immichframe/cache:/cache
