services:
  scheduler:
    image: "invoiceninja/invoiceninja-octane:5.12.28-o"
    container_name: "ix-invoice-ninja-scheduler-1"
    environment:
      DB_PORT: 3306
      CACHE_DRIVER: redis
      REDIS_CACHE_DB: 1
      APP_KEY: "${APP_KEY}"
      UMASK_SET: 002
      REDIS_DB: 0
      TZ: Etc/UTC
      DB_HOST: mariadb
      SESSION_DRIVER: redis
      DB_USERNAME: ninja
      REDIS_HOST: redis
      IN_USER_EMAIL: "${EMAIL}"
      DB_CONNECTION: mysql
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REQUIRE_HTTPS: false
      REDIS_USERNAME: default
      IN_PASSWORD: "${IN_PASSWORD}"
      LARAVEL_ROLE: scheduler
      APP_URL: "https://invoice.gsynch.com"
      UMASK: 002
      DB_PASSWORD: "${DB_PASSWORD}"
      PDF_GENERATOR: snappdf
      DB_DATABASE: ninja
      SCOUT_DRIVER: None
      QUEUE_CONNECTION: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: debian_docker
      APP_ENV: production
      IS_DOCKER: true
      PHANTOMJS_PDF_GENERATION: false
      PHPIZE_DEPS: "autoconf 		dpkg-dev 		file 		g++ 		gcc 		libc-dev 		make 		pkg-config 		re2c"
      PHP_INI_DIR: /usr/local/etc/php
      PHP_CFLAGS: "-fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
      PHP_CPPFLAGS: "-fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
      PHP_LDFLAGS: "-Wl,-O1 -pie"
      GPG_KEYS: "AFD8691FDAEDF03BDF6E460563F15A9B715376CA 9D7F99A0CB8F05C8A6958D6256A97AF7600A39A6 0616E93D95AF471243E26761770426E17EBBB3DD"
      PHP_VERSION: 8.4.13
      PHP_URL: "https://www.php.net/distributions/php-8.4.13.tar.xz"
      PHP_ASC_URL: "https://www.php.net/distributions/php-8.4.13.tar.xz.asc"
      PHP_SHA256: "${PHP_SHA256}"
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /data
      GODEBUG: cgocheck=0
    volumes:
      - ${DATA_PATH}:/app/storage
    restart: "unless-stopped"
    networks:
      - invoice-ninja_internal-invoice-ninja-net
  worker:
    image: "invoiceninja/invoiceninja-octane:5.12.28-o"
    container_name: "ix-invoice-ninja-worker-1"
