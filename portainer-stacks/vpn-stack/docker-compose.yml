version: "3.9"

networks:
  arrnet:
    external: true

x-logging: &gelf_logging
  driver: gelf
  options:
    gelf-address: "udp://${GELF_HOST}:${GELF_PORT}"
    tag: "{{.Name}}"

services:
  gluetun:
    image: qmcgaw/gluetun:${GLUETUN_TAG:-latest}
    container_name: gluetun
    cap_add: [NET_ADMIN]
    devices: [/path/to/mount/dev/net/tun]
    networks: [arrnet]
    ports:
      - "8085:8085"
      - "6881:6881"
      - "6881:6881/udp"
      - "3333:3333"
      - "8089:8080"
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - TZ=${TZ}
      - CONTROL_SERVER_ADDRESS=:8000
      - DOT=on
      - DNS_ADDRESS=1.1.1.1
      - DNS_KEEP_NAMESERVER=off
      - BLOCK_IPV6=on
      - FIREWALL=on
      - FIREWALL_INPUT_PORTS=${FIREWALL_INPUT_PORTS}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS}
      - BLOCK_MALICIOUS=on
      - HEALTH_TARGET_ADDRESS=cloudflare.com:443
    volumes:
      - ${APPS_CONFIG}/gluetun:/gluetun
    restart: unless-stopped
    logging: *gelf_logging

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${QBIT_TAG:-latest}
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on: [gluetun]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8085
    volumes:
      - ${APPS_CONFIG}/path/to/mount/config
      - ${DOWNLOADS_ROOT}:/downloadsq
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:${SAB_TAG:-latest}
    container_name: sabnzbd
    network_mode: "service:gluetun"
    depends_on: [gluetun]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_CONFIG}/path/to/mount/config
      - ${USENET_ROOT}:/downloads
    restart: unless-stopped

  postgres-bitmagnet:
    image: postgres:${PG_TAG:-16}
    container_name: postgres-bitmagnet
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on: [gluetun]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD=changeme
    volumes:
      - ${APPS_CONFIG}/path/to/mount/var/lib/postgresql/data

  bitmagnet-process:
    image: ghcr.io/bitmagnet-io/bitmagnet:${BITMAGNET_TAG:-latest}
    container_name: bitmagnet-process
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on: [postgres-bitmagnet]
    environment:
      - TZ=${TZ}
      - BITMAGNET__HTTP__ENABLED=true
      - BITMAGNET__HTTP__ADDR=${BITMAGNET_HTTP_ADDR}
      - POSTGRES_DSN=${POSTGRES_DSN}
    volumes:
      - ${APPS_CONFIG}/path/to/mount/config
      - ${APPS_CONFIG}/path/to/mount/data
    command: ["process"]

  bitmagnet-worker:
    image: ghcr.io/bitmagnet-io/bitmagnet:${BITMAGNET_TAG:-latest}
    container_name: bitmagnet-worker
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on: [postgres-bitmagnet]
    environment:
      - TZ=${TZ}
      - POSTGRES_DSN=${POSTGRES_DSN}
    volumes:
      - ${APPS_CONFIG}/path/to/mount/config
      - ${APPS_CONFIG}/path/to/mount/data
    command: [worker, run, --all]