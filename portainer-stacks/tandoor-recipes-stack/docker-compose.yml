version: "3.9"

services:
  postgres:
    image: postgres:${PG_TAG:-18}
    container_name: tandoor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD=changeme
      PGDATA: ${PGDATA}
      TZ: ${TZ}
    volumes:
      - ${STORAGE_ROOT}/postgres:${PGDATA}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 15

  tandoor:
    image: vabene1111/recipes:${TANDOOR_TAG:-latest}
    container_name: tandoor-recipes
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      TZ: ${TZ}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD=changeme
      SECRET_KEY=api-key-placeholder
      FRACTION_PREF_DEFAULT: "0"
      COMMENT_PREF_DEFAULT: "1"
      SHOPPING_AUTO_SYNC: "1"
      GUNICORN_MEDIA: "1"
      AI_ENABLE: "1"
      AI_PROVIDER: openai
      OPENAI_API_KEY=api-key-placeholder
      OPENAI_MODEL: ${OPENAI_MODEL}
    volumes:
      - ${STORAGE_ROOT}/files:/opt/recipes/files
      - ${STORAGE_ROOT}/media:/opt/recipes/mediafiles