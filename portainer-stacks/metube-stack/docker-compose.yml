version: "3.9"

services:
  metube:
    image: ghcr.io/alexta69/metube:${METUBE_TAG:-latest}
    container_name: metube
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    volumes:
      - ${MEDIA_ROOT}:/downloads:rw
      - ${STORAGE_ROOT}/state:/downloads/.metube:rw
    environment:
      - UID=${PUID}
      - GID=${PGID}
      - DOWNLOAD_DIR=${DOWNLOAD_DIR}
      - STATE_DIR=${STATE_DIR}
      - YTDL_OPTIONS=${YTDL_OPTIONS}