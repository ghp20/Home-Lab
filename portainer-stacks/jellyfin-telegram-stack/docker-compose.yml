version: "3.8"

services:
  jellyfin-telegram:
    image: python:${PYTHON_TAG:-3.11-slim}
    container_name: jellyfin-telegram
    restart: unless-stopped
    environment:
      JELLYFIN_URL: ${JELLYFIN_URL}
      JELLYFIN_API_KEY=api-key-placeholder
      TELEGRAM_TOKEN=api-key-placeholder
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ${STORAGE_ROOT}:/app
    working_dir: /app
    command: >
      sh -c "pip install requests &&
             python app.py" 