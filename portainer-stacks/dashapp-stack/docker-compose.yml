version: '3'
services:
  dashapp:
    image: python:${PYTHON_TAG:-3.11-slim}
    container_name: dashapp
    command: sh -c "pip install dash dash-daq psutil && python /app/app.py"
    volumes:
      - ${STORAGE_ROOT}:/app
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    restart: unless-stopped