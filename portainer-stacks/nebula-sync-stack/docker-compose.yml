
services:
  orbital-sync:
    image: orbital-sync:local-v6
    container_name: orbital-sync
    user: "3001:3000"
    environment:
      - PIHOLE_VERSION=${PIHOLE_VERSION}
      - PRIMARY_HOST_BASE_URL=${PRIMARY_HOST_BASE_URL}
      - PRIMARY_HOST_PASSWORD=changeme
      - PRIMARY_HOST_PATH=${PRIMARY_HOST_PATH}
      - SECONDARY_HOSTS_1_BASE_URL=${SECONDARY_HOSTS_1_BASE_URL}
      - SECONDARY_HOSTS_1_PASSWORD=changeme
      - SECONDARY_HOSTS_1_PATH=${SECONDARY_HOSTS_1_PATH}
      - INTERVAL_MINUTES=${INTERVAL_MINUTES}
      - VERBOSE=true
    restart: unless-stopped
    volumes:
      - /path/to/mount/app/data
