version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - /mnt/storagepool/apps_config/monitoring/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/storagepool/apps_config/monitoring/prometheus/data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - /mnt/storagepool/apps_config/monitoring/grafana/data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge