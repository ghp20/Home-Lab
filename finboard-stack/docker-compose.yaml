version: "3.9"

services:
  backend:
    image: finboard-backend:${BACKEND_TAG:-latest}
    container_name: fin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: changeme
      PORT: 3000
      JWT_SECRET: changeme-secret
      DB_PATH: changeme
      DB_BACKUP_DIR: changeme
      SMTP_HOST: changeme
      SMTP_PORT: changeme
      SMTP_SECURE: changeme
      SMTP_USER: changeme
      SMTP_PASS: changeme
      SMTP_FROM: changeme
      APP_URL: changeme
      PLAID_CLIENT_ID: changeme
      PLAID_SECRET: changeme-secret
      PLAID_ENV: changeme
    volumes:
      - ${STORAGE_ROOT}/db:/data
      - ${STORAGE_ROOT}/backups:/data/backups
    networks: [internal]
    expose: ["3000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: finboard-frontend:${FRONTEND_TAG:-latest}
    container_name: fin-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:80"
    networks: [internal]
    depends_on:
      backend: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--header=X-Forwarded-Proto: https", "http://127.0.0.1:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal: {driver: bridge}