version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rr_postgres
    restart: unless-stopped
    volumes:
      - /path/to/your/data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  printer:
    image: ghcr.io/browserless/chromium:latest
    container_name: rr_printer
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HEALTH: "true"
      CONCURRENT: 10

  app:
    image: amruthpillai/reactive-resume:latest
    container_name: rr_app
    restart: unless-stopped
    ports:
      - "30120:3000"
    depends_on:
      postgres:
        condition: service_healthy
      printer:
        condition: service_started

    volumes:
      # keep your existing dataset
      - /path/to/your/data:/app/data

    environment:
      # --- Core ---
      NODE_ENV: production
      PORT: 3000
      APP_URL: http://your-server-ip:30120
      TZ: Etc/UTC

      # --- Database ---
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/postgres

      # --- Auth (64-char secrets REQUIRED) ---
      AUTH_SECRET: changeme

      # --- Printer / PDF ---
      PRINTER_ENDPOINT: ws://printer:3000

      # --- Email (disabled safely) ---
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${ADMIN_EMAIL}
      SMTP_PASS: ${SMTP_APP_PASSWORD}
      SMTP_FROM: "${SMTP_FROM_NAME}"

      # --- Storage (local filesystem, not S3) ---
      S3_ACCESS_KEY_ID:
      S3_SECRET_ACCESS_KEY:
      S3_REGION:
      S3_ENDPOINT:
      S3_BUCKET:
      S3_FORCE_PATH_STYLE: "false"

      # --- Feature Flags ---
      FLAG_DEBUG_PRINTER: "false"
      FLAG_DISABLE_SIGNUPS: "false"
      FLAG_DISABLE_EMAIL_AUTH: "false"